<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鬼畜钢琴</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Mahjong Container -->
    <div id="mahjongBoard" class="dots-0">
        <!-- JS injects kuso blocks here -->
    </div>

    <!-- Piano Container -->
    <div id="pianoContainer">
        <ul class="piano">
            <li class="white" data-note="1"></li>
            <li class="black" data-note="2"></li>
            <li class="white" data-note="3"></li>
            <li class="black" data-note="4"></li>
            <li class="white" data-note="5"></li>
            <li class="white" data-note="6"></li>
            <li class="black" data-note="7"></li>
            <li class="white" data-note="8"></li>
            <li class="black" data-note="9"></li>
            <li class="white" data-note="10"></li>
            <li class="black" data-note="11"></li>
            <li class="white" data-note="12"></li>
        </ul>
    </div>

    <script src="main.js"></script>
</body>

</html>
